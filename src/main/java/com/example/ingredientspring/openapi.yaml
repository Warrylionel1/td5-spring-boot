openapi: 3.0.3
info:
  title: Ingredient and Dish API
  version: 1.0.0

paths:
  /ingredients:
    get:
      tags: [ Ingredients ]
      summary: Get all ingredients
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ingredient'
              example:
                - id: 1
                  name: Tomato
                  category: VEGETABLE
                  price: 2.5

  /ingredients/{id}:
    get:
      tags: [ Ingredients ]
      summary: Get ingredient by id
      parameters:
        - $ref: '#/components/parameters/IngredientId'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ingredient'
              example:
                id: 1
                name: Tomato
                category: VEGETABLE
                price: 2.5
        404:
          description: Ingredient not found

  /ingredients/{id}/stock:
    get:
      tags: [ Ingredients ]
      summary: Get ingredient stock
      parameters:
        - $ref: '#/components/parameters/IngredientId'
        - $ref: '#/components/parameters/At'
        - $ref: '#/components/parameters/Unit'
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockValue'
              example:
                quantity: 10
                unit: KG
        400:
          description: Missing parameters
        404:
          description: Ingredient not found

  /dishes:
    get:
      tags: [ Dishes ]
      summary: Get all dishes
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dish'
              example:
                - id: 1
                  name: Grilled Chicken
                  price: 12.9
                  ingredients:
                    - id: 2
                      name: Chicken
                      category: ANIMAL
                      price: 8.0

  /dishes/{id}/ingredients:
    put:
      tags: [ Dishes ]
      summary: Update dish ingredients
      parameters:
        - $ref: '#/components/parameters/DishId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/DishIngredient'
            example:
              - ingredient:
                  id: 1
              - ingredient:
                  id: 2
      responses:
        200:
          description: OK
        400:
          description: Missing body
        404:
          description: Dish not found

components:

  parameters:
    IngredientId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      example: 1

    DishId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      example: 1

    At:
      name: at
      in: query
      required: true
      schema:
        type: string
      example: 2026-06-01T12:00:00Z

    Unit:
      name: unit
      in: query
      required: true
      schema:
        type: string
      example: KG

  schemas:

    Ingredient:
      type: object
      required:
        - id
        - name
        - category
        - price
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Tomato
        category:
          type: string
          example: VEGETABLE
        price:
          type: number
          example: 2.5

    StockValue:
      type: object
      required:
        - quantity
        - unit
      properties:
        quantity:
          type: number
          example: 10
        unit:
          type: string
          example: KG

    DishIngredient:
      type: object
      required:
        - ingredient
      properties:
        ingredient:
          type: object
          required:
            - id
          properties:
            id:
              type: integer
              example: 1

    Dish:
      type: object
      required:
        - id
        - name
        - price
        - ingredients
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Grilled Chicken
        price:
          type: number
          example: 12.9
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/Ingredient'